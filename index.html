<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荣格八维 MBTI 人格测试</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: #e0e0e0;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 20px; }

  /* --- 首页 --- */
  #home {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 85vh; text-align: center;
  }
  #home h1 {
    font-size: 2.6em; background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  #home .subtitle { font-size: 1.1em; color: #94a3b8; margin-bottom: 30px; line-height: 1.7; }
  #home .intro-box {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px; padding: 28px 32px; margin-bottom: 36px; max-width: 600px;
    text-align: left; line-height: 1.9; font-size: 0.95em; color: #cbd5e1;
  }
  .func-badges {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0 10px;
  }
  .func-badges span {
    background: rgba(167,139,250,0.15); color: #a78bfa; padding: 4px 14px;
    border-radius: 20px; font-size: 0.82em; font-weight: 500;
  }
  .btn {
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    border: none; color: #fff; font-size: 1.15em; font-weight: 600;
    padding: 14px 48px; border-radius: 40px; cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 4px 24px rgba(124,58,237,0.35);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 32px rgba(124,58,237,0.5); }
  .btn:active { transform: scale(0.97); }

  /* --- 进度条 --- */
  .progress-wrap { margin: 16px 0 24px; }
  .progress-bar {
    background: rgba(255,255,255,0.08); border-radius: 12px; height: 8px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%; background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
    border-radius: 12px; transition: width .5s ease;
  }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.85em; color: #94a3b8; margin-bottom: 6px; }

  /* --- 题目卡片 --- */
  .question-card {
    display: none; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
    padding: 32px 28px; animation: fadeIn .4s ease;
  }
  .question-card.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .q-number { font-size: 0.85em; color: #64748b; margin-bottom: 4px; }
  .q-func-label {
    display: inline-block; background: rgba(167,139,250,0.15); color: #a78bfa;
    padding: 2px 12px; border-radius: 12px; font-size: 0.75em; margin-bottom: 14px;
  }
  .q-text { font-size: 1.2em; font-weight: 500; line-height: 1.7; margin-bottom: 28px; }
  .scale {
    display: flex; justify-content: space-between; gap: 6px; margin-bottom: 30px;
  }
  .scale-btn {
    flex: 1; aspect-ratio: 1 / 1; max-width: 60px;
    border-radius: 50%; border: 2px solid rgba(255,255,255,0.12);
    background: transparent; color: #94a3b8; font-size: 1.1em; font-weight: 600;
    cursor: pointer; transition: all .2s;
  }
  .scale-btn:hover { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,0.08); }
  .scale-btn.selected { border-color: #7c3aed; background: #7c3aed; color: #fff; }
  .scale-labels {
    display: flex; justify-content: space-between; font-size: 0.78em; color: #64748b;
    margin-top: -18px; margin-bottom: 10px;
  }
  .scale-labels span { text-align: center; flex: 1; }
  .nav-btns { display: flex; gap: 12px; justify-content: space-between; }
  .nav-btns button {
    padding: 10px 28px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06); color: #e0e0e0; font-size: 0.95em;
    cursor: pointer; transition: all .2s; font-weight: 500;
  }
  .nav-btns button:hover { background: rgba(255,255,255,0.12); }
  .nav-btns button:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btns button.primary {
    background: linear-gradient(135deg, #7c3aed, #3b82f6); border-color: transparent; color: #fff;
  }
  .nav-btns button.primary:hover { box-shadow: 0 4px 20px rgba(124,58,237,0.4); }

  /* --- 结果页 --- */
  #result {
    display: none; padding: 20px 0;
  }
  #result.show { display: block; animation: fadeIn .6s ease; }
  .result-header {
    text-align: center; margin-bottom: 32px;
  }
  .result-type {
    font-size: 4em; font-weight: 800;
    background: linear-gradient(135deg, #f59e0b, #ec4899, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 6px;
  }
  .result-name { font-size: 1.5em; color: #e2e8f0; margin-top: 4px; font-weight: 600; }
  .result-desc { color: #94a3b8; max-width: 560px; margin: 10px auto 0; line-height: 1.8; font-size: 0.95em; }

  /* --- 功能雷达 --- */
  .radar-wrap { background: rgba(255,255,255,0.04); border-radius: 20px; padding: 24px; margin-bottom: 28px; }
  .radar-wrap h3 { font-size: 1em; color: #94a3b8; margin-bottom: 16px; text-align: center; }
  .radar-chart { position: relative; width: 100%; max-width: 420px; margin: 0 auto; }
  .radar-chart canvas { width: 100%; height: auto; }

  /* --- 功能详情 --- */
  .func-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .func-item {
    background: rgba(255,255,255,0.04); border-radius: 14px; padding: 14px 16px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .func-item .func-name { font-weight: 600; font-size: 0.95em; margin-bottom: 4px; }
  .func-item .func-score { font-size: 1.3em; font-weight: 700; }
  .func-item .func-score-bar {
    height: 4px; border-radius: 4px; margin-top: 6px; background: rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .func-item .func-score-bar div {
    height: 100%; border-radius: 4px; transition: width .8s ease;
  }
  .fi .func-name, .fi .func-score { color: #f472b6; } .fi .func-score-bar div { background: #f472b6; }
  .fe .func-name, .fe .func-score { color: #fb923c; } .fe .func-score-bar div { background: #fb923c; }
  .ti .func-name, .ti .func-score { color: #4ade80; } .ti .func-score-bar div { background: #4ade80; }
  .te .func-name, .te .func-score { color: #22d3ee; } .te .func-score-bar div { background: #22d3ee; }
  .ni .func-name, .ni .func-score { color: #a78bfa; } .ni .func-score-bar div { background: #a78bfa; }
  .ne .func-name, .ne .func-score { color: #60a5fa; } .ne .func-score-bar div { background: #60a5fa; }
  .si .func-name, .si .func-score { color: #fbbf24; } .si .func-score-bar div { background: #fbbf24; }
  .se .func-name, .se .func-score { color: #34d399; } .se .func-score-bar div { background: #34d399; }

  /* --- 功能栈 --- */
  .stack-wrap { background: rgba(255,255,255,0.04); border-radius: 20px; padding: 24px; margin-bottom: 28px; }
  .stack-wrap h3 { font-size: 1em; color: #94a3b8; margin-bottom: 16px; text-align: center; }
  .stack-cards { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .stack-card {
    background: rgba(255,255,255,0.06); border-radius: 14px; padding: 14px 18px; text-align: center;
    min-width: 100px; border: 1px solid rgba(255,255,255,0.08);
  }
  .stack-card .stack-order { font-size: 0.75em; color: #64748b; }
  .stack-card .stack-func { font-size: 1.3em; font-weight: 700; margin: 4px 0 2px; }
  .stack-card .stack-label { font-size: 0.78em; color: #94a3b8; }

  .btn-restart {
    display: block; margin: 0 auto; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12); color: #e0e0e0;
    padding: 12px 36px; border-radius: 30px; font-size: 1em; cursor: pointer; transition: all .2s;
  }
  .btn-restart:hover { background: rgba(255,255,255,0.15); }

  @media (max-width: 640px) {
    #home h1 { font-size: 1.8em; }
    .func-details { grid-template-columns: 1fr 1fr; }
    .scale-btn { max-width: 44px; font-size: 0.95em; }
    .question-card { padding: 24px 18px; }
    .q-text { font-size: 1.05em; }
    .stack-card { min-width: 72px; padding: 10px 12px; }
    .stack-card .stack-func { font-size: 1.1em; }
    .result-type { font-size: 3em; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- ========== 首页 ========== -->
  <div id="home">
    <h1>🧠 荣格八维 · 人格罗盘</h1>
    <p class="subtitle">基于认知功能的 MBTI 深度测评</p>
    <div class="intro-box">
      <p>不同于传统二分法，本测试基于 <strong>荣格八维认知功能</strong>（Jungian Cognitive Functions）来定位你的 MBTI 类型。</p>
      <div class="func-badges">
        <span>Fi 内倾情感</span><span>Fe 外倾情感</span>
        <span>Ti 内倾思考</span><span>Te 外倾思考</span>
        <span>Ni 内倾直觉</span><span>Ne 外倾直觉</span>
        <span>Si 内倾感觉</span><span>Se 外倾感觉</span>
      </div>
      <p>共 <strong>56 题</strong>，约 8-12 分钟完成。请根据第一反应选择，无需过度思考。</p>
    </div>
    <button class="btn" onclick="startTest()">开始测试 →</button>
  </div>

  <!-- ========== 测试 ========== -->
  <div id="quiz" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-label"><span id="pLabel">1 / 56</span><span id="pPct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
    </div>
    <div id="qContainer"></div>
  </div>

  <!-- ========== 结果 ========== -->
  <div id="result">
    <div class="result-header">
      <div class="result-type" id="rType">INFP</div>
      <div class="result-name" id="rName">调停者</div>
      <div class="result-desc" id="rDesc">理想主义者，诗意且善良的内心世界……</div>
    </div>

    <div class="radar-wrap">
      <h3>📊 八维认知功能雷达图</h3>
      <div class="radar-chart"><canvas id="radarCanvas" width="400" height="400"></canvas></div>
    </div>

    <div class="func-details" id="funcDetails"></div>

    <div class="stack-wrap">
      <h3>🧩 你的功能栈</h3>
      <div class="stack-cards" id="stackCards"></div>
    </div>

    <button class="btn-restart" onclick="restart()">🔄 重新测试</button>
  </div>

</div>

<script>
// =====================================================
// 1. 八维认知功能定义
// =====================================================
const FUNCTIONS = {
  Fi: { label: '内倾情感', en: 'Introverted Feeling', color: '#f472b6' },
  Fe: { label: '外倾情感', en: 'Extraverted Feeling', color: '#fb923c' },
  Ti: { label: '内倾思考', en: 'Introverted Thinking', color: '#4ade80' },
  Te: { label: '外倾思考', en: 'Extraverted Thinking', color: '#22d3ee' },
  Ni: { label: '内倾直觉', en: 'Introverted Intuition', color: '#a78bfa' },
  Ne: { label: '外倾直觉', en: 'Extraverted Intuition', color: '#60a5fa' },
  Si: { label: '内倾感觉', en: 'Introverted Sensation', color: '#fbbf24' },
  Se: { label: '外倾感觉', en: 'Extraverted Sensation', color: '#34d399' },
};

// =====================================================
// 2. 16 种 MBTI 类型信息
// =====================================================
const TYPES = {
  INFP: { name_cn: '调停者', stack: ['Fi','Ne','Si','Te'],

  ENFP: { name_cn: '活动家', stack: ['Ne','Fi','Te','Si'],

  ISTP: { name_cn: '鉴赏家', stack: ['Ti','Se','Ni','Fe'],

  ENTJ: { name_cn: '指挥官', stack: ['Te','Ni','Se','Fi'],
    desc: '天生的领袖，果断高效。具有远见卓识，善于制定战略并推动执行。' },
  ESTJ: { name_cn: '总经理', stack: ['Te','Si','Ne','Fi'],

  ISTJ: { name_cn: '物流师', stack: ['Si','Te','Fi','Ne'],
    desc: '正直可靠，尽职尽责。注重细节与规则，是坚守承诺的实干家。' },
  ISFJ: { name_cn: '守卫者', stack: ['Si','Fe','Ti','Ne'],
    desc: '温柔体贴，默默付出。极具责任感和奉献精神，是值得信赖的守护者。' },
  ESFP: { name_cn: '表演者', stack: ['Se','Fi','Te','Ni'],

  ESTP: { name_cn: '企业家', stack: ['Se','Ti','Fe','Ni'],
    desc: '大胆务实，行动力强。善于把握机会，在动态环境中游刃有余。' },

// =====================================================
// 3. 56 道题目 (每题对应一种认知功能)
// =====================================================
const QUESTIONS = [
  // ----- Fi (内倾情感) -----
  { func: 'Fi', text: '我高度重视自己的价值观，不愿为了迎合他人而违背内心。' },

  { func: 'Si', text: '我会把以往的经验作为当下决策的重要参考。' },
  { func: 'Si', text: '我喜欢把东西整理得井井有条，按惯例行事。' },
  { func: 'Si', text: '和旧友回忆过去的美好时光让我感到温暖。' },
  { func: 'Si', text: '对于熟悉的事物，我会感到一种深厚的归属感。' },
  { func: 'Si', text: '我习惯在做事前先参照已有的流程和方法。' },

  // ----- Se (外倾感觉) -----
  { func: 'Se', text: '我善于观察周围的物理环境，能注意到细微的变化。' },
  { func: 'Se', text: '我喜欢亲身体验，从实践和感官刺激中获取信息。' },
  { func: 'Se', text: '我对当下的瞬间非常专注，很少走神。' },
  { func: 'Se', text: '我享受美食、音乐、运动等感官体验带来的愉悦。' },
  { func: 'Se', text: '面对突发状况，我能快速反应并采取行动。' },
  { func: 'Se', text: '我喜欢动手操作，而不是纸上谈兵。' },
  { func: 'Se', text: '我注重生活品质，喜欢营造舒适的环境。' },
];

// =====================================================
// 3b. 题型映射
// =====================================================
const FUNC_ORDER = ['Fi','Fe','Ti','Te','Ni','Ne','Si','Se'];

// =====================================================
// 4. 测试状态
// =====================================================
let currentQ = 0;
let answers = new Array(QUESTIONS.length).fill(null);
let testStarted = false;

// =====================================================
// 5. UI: 开始测试
// =====================================================
function startTest() {
  document.getElementById('home').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('result').classList.remove('show');
  document.getElementById('result').style.display = 'none';
  currentQ = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  testStarted = true;
  renderQuestion();
  updateProgress();
}

// =====================================================
// 6. UI: 渲染题目
// =====================================================
function renderQuestion() {
  const container = document.getElementById('qContainer');
  const q = QUESTIONS[currentQ];
  const func = FUNCTIONS[q.func];
  const total = QUESTIONS.length;
  const idx = currentQ;

  container.innerHTML = `
    <div class="question-card active">
      <div class="q-number">第 ${idx+1} / ${total} 题</div>
      <div class="q-func-label">${func.label} (${q.func})</div>
      <div class="q-text">${q.text}</div>
      <div class="scale" id="scaleGroup">
        ${[1,2,3,4,5,6,7].map(v => `
          <button class="scale-btn ${answers[idx] === v ? 'selected' : ''}" data-v="${v}" onclick="selectAnswer(${v})">${v}</button>
        `).join('')}
      </div>
      <div class="scale-labels">
        <span>完全<br>不同意</span><span></span><span></span>
        <span>中立</span><span></span><span></span>
        <span>完全<br>同意</span>
      </div>
      <div class="nav-btns">
        <button ${idx === 0 ? 'disabled' : ''} onclick="goQ(${idx-1})">← 上一题</button>
        <span></span>
        <button class="primary" onclick="nextQ()">${idx === total-1 ? '✅ 查看结果' : '下一题 →'}</button>
      </div>
    </div>
  `;
  updateProgress();
}

function selectAnswer(v) {
  answers[currentQ] = v;
  document.querySelectorAll('.scale-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.v) === v);
  });
}

function goQ(idx) {
  if (idx < 0 || idx >= QUESTIONS.length) return;
  currentQ = idx;
  renderQuestion();
}

function nextQ() {
  if (answers[currentQ] === null) {
    const scale = document.getElementById('scaleGroup');
    scale.style.animation = 'none';
    setTimeout(() => { scale.style.animation = 'shake .4s ease'; }, 10);
    return;
  }
  if (currentQ === QUESTIONS.length - 1) {
    showResult();
    return;
  }
  currentQ++;
  renderQuestion();
}

function updateProgress() {
  const total = QUESTIONS.length;
  const done = answers.filter(a => a !== null).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('pLabel').textContent = `${Math.min(done+1, total)} / ${total}`;
  document.getElementById('pPct').textContent = `${pct}%`;
  document.getElementById('pFill').style.width = `${pct}%`;
}

// =====================================================
// 7. 核心算法：计算八维分数 → 判定 MBTI
// =====================================================
function computeScores() {
  const scores = {};
  FUNC_ORDER.forEach(f => scores[f] = 0);
  const counts = {};
  FUNC_ORDER.forEach(f => counts[f] = 0);

  QUESTIONS.forEach((q, i) => {
    if (answers[i] === null) return;
    scores[q.func] += answers[i];
    counts[q.func]++;
  });

  // 归一化为 1-10 分制
  const result = {};
  FUNC_ORDER.forEach(f => {
    const avg = counts[f] > 0 ? scores[f] / counts[f] : 4;
    result[f] = Math.round(((avg - 1) / 6) * 9 + 1);
  });
  return result;
}

function determineType(funcScores) {
  let bestType = null;
  let bestScore = -Infinity;

  const weights = [4, 3, 2, 1]; // 主导 *4, 辅助 *3, 第三 *2, 劣势 *1

  for (const [type, info] of Object.entries(TYPES)) {
    let score = 0;
    info.stack.forEach((f, i) => {
      score += funcScores[f] * weights[i];
    });
    if (score > bestScore) {
      bestScore = score;
      bestType = type;
    }
  }

  return bestType;
}

// =====================================================
// 8. 展示结果
// =====================================================
function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  resultEl.classList.add('show');

  const scores = computeScores();
  const type = determineType(scores);
  const info = TYPES[type];

  // 类型信息
  document.getElementById('rType').textContent = type;
  document.getElementById('rName').textContent = info.name_cn;
  document.getElementById('rDesc').textContent = info.desc;

  // 功能详情
  renderFuncDetails(scores);

  // 功能栈
  renderStack(info);

  // 雷达图
  drawRadar(scores);
}

function renderFuncDetails(scores) {
  const container = document.getElementById('funcDetails');
  const sorted = FUNC_ORDER.slice().sort((a,b) => scores[b] - scores[a]);
  container.innerHTML = sorted.map(f => {
    const s = scores[f];
    const pct = ((s - 1) / 9) * 100;
    return `
      <div class="func-item ${f.toLowerCase()}">
        <div class="func-name">${FUNCTIONS[f].label} (${f})</div>
        <div class="func-score">${s}/10</div>
        <div class="func-score-bar"><div style="width:${pct}%"></div></div>
      </div>
    `;
  }).join('');
}

function renderStack(info) {
  const container = document.getElementById('stackCards');
  const labels = ['主导功能', '辅助功能', '第三功能', '劣势功能'];
  container.innerHTML = info.stack.map((f, i) => `
    <div class="stack-card">
      <div class="stack-order">${labels[i]}</div>
      <div class="stack-func" style="color:${FUNCTIONS[f].color}">${f}</div>
      <div class="stack-label">${FUNCTIONS[f].label}</div>
    </div>
  `).join('');
}

// =====================================================
// 9. 雷达图
// =====================================================
function drawRadar(scores) {
  const canvas = document.getElementById('radarCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2, R = Math.min(cx, cy) - 30;

  ctx.clearRect(0, 0, W, H);

  const funcs = FUNC_ORDER;
  const n = funcs.length;

  // 画网格 (5层)
  for (let ring = 1; ring <= 5; ring++) {
    const r = (R / 5) * ring;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 画轴线
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.stroke();
  }

  // 填充数据
  ctx.beginPath();
  for (let i = 0; i <= n; i++) {
    const idx = i % n;
    const val = (scores[funcs[idx]] - 1) / 9;
    const r = val * R;
    const angle = (Math.PI * 2 * idx) / n - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(167,139,250,0.2)';
  ctx.fill();
  ctx.strokeStyle = '#a78bfa';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // 数据点
  for (let i = 0; i < n; i++) {
    const val = (scores[funcs[i]] - 1) / 9;
    const r = val * R;
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#a78bfa';
    ctx.fill();
  }

  // 标签
  ctx.font = '12px -apple-system, "Noto Sans SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    const x = cx + (R + 28) * Math.cos(angle);
    const y = cy + (R + 28) * Math.sin(angle);
    ctx.fillStyle = FUNCTIONS[funcs[i]].color;
    const label = funcs[i] + '\n' + scores[funcs[i]];
    const lines = label.split('\n');
    lines.forEach((line, li) => {
      ctx.fillText(line, x, y + li * 16);
    });
  }
}

// =====================================================
// 10. 重新开始
// =====================================================
function restart() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('result').classList.remove('show');
  document.getElementById('home').style.display = 'flex';
  testStarted = false;
  currentQ = 0;
  answers = new Array(QUESTIONS.length).fill(null);
}

// shaking animation
const styleSheet = document.createElement('style');
styleSheet.textContent = `
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
`;
document.head.appendChild(styleSheet);

</script>
